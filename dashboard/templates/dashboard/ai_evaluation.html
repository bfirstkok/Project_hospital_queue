<!doctype html>
<html lang="th">
<head>
  
  {% load static %}
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ประเมินผลระบบช่วยคัดกรอง</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0a0e1a; color: #e8eaf0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    a { color: #00d4aa; text-decoration: none; }
    .card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: 18px; margin: 14px 0; }
    pre { white-space: pre-wrap; overflow: auto; background: rgba(0,0,0,.25); border-radius: 8px; padding: 14px; }
    .muted { color: rgba(255,255,255,.55); }
  </style>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <div class="wrap">
    <a href="/dashboard/">กลับแดชบอร์ด</a>
    <h1>ประเมินผลระบบช่วยคัดกรอง</h1>
    <p class="muted">ผลประเมินโมเดล Decision Tree จากชุดข้อมูลคัดกรองจำลอง</p>

    <div class="card">
      <h2>ตัวชี้วัด</h2>
      <pre>{{ metrics }}</pre>
    </div>

    <div class="card">
      <h2>ตาราง Confusion Matrix</h2>
      <pre>{{ confusion }}</pre>
    </div>
  </div>
</body>
</html>
