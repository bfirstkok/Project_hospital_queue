<!doctype html>
<html lang="th">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ติดตามผู้ป่วย</title>
  <style>
    /* ===== RESET ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== BODY & SHELL ===== */
    body {
      font-family: 'Sarabun', sans-serif;
      background: #0a0e1a;
      color: #e8eaf0;
      min-height: 100vh;
    }

    .shell {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      min-height: 100vh;
      background: #0a0e1a;
      padding: 0;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.02);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00d4aa, #0096ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 0px;
    }

    .nav-pills {
      display: flex;
      gap: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 3px;
    }

    .nav-pill {
      padding: 5px 13px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.45);
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'Sarabun', sans-serif;
      text-decoration: none;
      display: inline-block;
    }

    .nav-pill.active {
      background: rgba(0, 212, 170, 0.15);
      color: #00d4aa;
    }

    .nav-pill:hover:not(.active) {
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.06);
    }

    /* ===== STATUS BAR ===== */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.01);
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.good {
      background: #86efac;
    }

    .dot.bad {
      background: #ff5f72;
    }

    .muted {
      color: rgba(255, 255, 255, 0.35);
    }

    #status {
      flex: 1;
      text-align: right;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ===== STAT CARDS ===== */
    #cards {
      padding: 10px 28px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.01);
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 6px;
    }

    .stat-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    /* ===== TABLE ===== */
    .tableWrap {
      padding: 10px 28px;
      overflow: auto;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      overflow: hidden;
    }

    thead {
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    th {
      padding: 14px 16px;
      font-size: 11px;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      text-align: left;
    }

    td {
      padding: 13px 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    /* ===== SEVERITY BADGES ===== */
    .sev {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .sev.red {
      background: rgba(255, 95, 114, 0.15);
      color: #ff5f72;
    }

    .sev.yellow {
      background: rgba(255, 184, 48, 0.15);
      color: #ffb830;
    }

    .sev.green {
      background: rgba(0, 212, 170, 0.15);
      color: #00d4aa;
    }

    /* ===== VITALS ===== */
    .vitals {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .kv {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }

    /* ===== LINKS & TAGS ===== */
    .rightLink {
      color: #00d4aa;
      text-decoration: none;
      font-size: 11px;
      cursor: pointer;
    }

    .rightLink:hover {
      text-decoration: underline;
    }

    .onlineTag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .onlineTag.online {
      background: rgba(134, 239, 172, 0.15);
      color: #86efac;
    }

    .onlineTag.offline {
      background: rgba(255, 95, 114, 0.15);
      color: #ff5f72;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .statusbar {
        padding: 12px 16px;
      }

      .tableWrap {
        padding: 12px 16px;
      }

      td {
        padding: 10px 12px;
      }

      #cards {
        padding: 12px 16px;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }
    }
  </style>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>

<body>
<div class="shell">
  <div class="topbar">
    <div class="logo-area">
      <div class="logo-icon">🩺</div>
      <div>
        <div class="logo-text">ติดตามผู้ป่วย</div>
        <div class="logo-sub">ติดตามผู้ป่วยจาก IoT (auto refresh)</div>
      </div>
    </div>
    <div class="nav-pills">
      <a class="nav-pill" href="/queues/">คิว</a>
      <a class="nav-pill active" href="/queues/monitor/">ติดตาม</a>
      <a class="nav-pill" href="/opd/">ห้องตรวจ</a>
      <a class="nav-pill" href="/dashboard/">แดชบอร์ด</a>
    </div>
  </div>

  <div class="statusbar">
    <div class="pill"><span class="dot good"></span>ออนไลน์ = ข้อมูลล่าสุดภายใน 60 วินาที</div>
    <div class="pill"><span class="dot bad"></span>ออฟไลน์ = เกิน 60 วินาที</div>
    <div id="status">กำลังโหลด...</div>
  </div>

  <div id="cards"></div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>ลำดับ</th>
          <th>ผู้ป่วย</th>
          <th>ระดับ</th>
          <th>AI</th>
          <th>อุปกรณ์</th>
          <th>ออนไลน์</th>
          <th>สัญญาณชีพล่าสุด</th>
          <th>คำสั่ง</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="8" class="muted">กำลังโหลด...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function sevClass(s){
    if(!s) return "";
    const x = String(s).toUpperCase();
    if(x.includes("RED")) return "red";
    if(x.includes("YELLOW")) return "yellow";
    return "green";
  }

  function renderCards(items){
    const all = items.length;
    const online = items.filter(x => x.online).length;
    const offline = all - online;
    const red = items.filter(x => (x.severity||"").toUpperCase()==="RED").length;
    const yellow = items.filter(x => (x.severity||"").toUpperCase()==="YELLOW").length;
    const green = items.filter(x => (x.severity||"").toUpperCase()==="GREEN").length;

    return `
      ${card("ทั้งหมด", all)}
      ${card("ออนไลน์", online)}
      ${card("ออฟไลน์", offline)}
      ${card("RED", red)}
      ${card("YELLOW", yellow)}
      ${card("GREEN", green)}
    `;

    function card(label, value){
      return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-number">${value}</div></div>`;
    }
  }

  async function loadLatest() {
    const elStatus = document.getElementById("status");
    const elRows = document.getElementById("rows");
    const elCards = document.getElementById("cards");

    try {
      const res = await fetch("/queues/monitor/api/summary/");
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");

      const nowStr = new Date().toLocaleTimeString();
      const items = data.items || [];
      const onlineCount = items.filter(r => r.online).length;
      elStatus.textContent = `อัปเดตล่าสุด: ${nowStr} | ออนไลน์: ${onlineCount}/${items.length}`;

      if(elCards) elCards.innerHTML = renderCards(items);

      if (items.length === 0) {
        elRows.innerHTML = `<tr><td colspan="8" class="muted">ยังไม่มีข้อมูล</td></tr>`;
        return;
      }

      elRows.innerHTML = items.map(r => {
        const onlineText = r.online ? "ออนไลน์" : "ออฟไลน์";
        const onlineCls = r.online ? "online" : "offline";
        const dotCls = r.online ? "good" : "bad";
        const sev = r.severity ?? "-";
        const sevCss = sevClass(sev);
        const v = r.vitals || {};
        const bp = (v.sys_bp ?? "-") + "/" + (v.dia_bp ?? "-");
        const vitalsHtml = `
          <div class="vitals">
            <span class="kv"><span class="muted">BPM</span> <b>${v.bpm ?? "-"}</b></span>
            <span class="kv"><span class="muted">O2</span> <b>${v.o2sat ?? "-"}</b></span>
            <span class="kv"><span class="muted">BT</span> <b>${v.bt ?? "-"}</b></span>
            <span class="kv"><span class="muted">RR</span> <b>${v.rr ?? "-"}</b></span>
            <span class="kv"><span class="muted">BP</span> <b>${bp}</b></span>
          </div>
        `;

        return `
          <tr>
            <td><b>#${r.visit_id}</b></td>
            <td><div style="font-weight:800">${r.patient_name ?? "-"}</div></td>
            <td><span class="sev ${sevCss}">${sev}</span></td>
            <td>-</td>
            <td>${r.device_id ?? "-"}</td>
            <td><span class="onlineTag ${onlineCls}"><span class="dot ${dotCls}"></span>${onlineText}</span></td>
            <td>${vitalsHtml}</td>
            <td><a class="rightLink" href="/queues/monitor/visit/${r.visit_id}/">ดูรายละเอียด</a></td>
          </tr>
        `;
      }).join("");

    } catch (e) {
      elStatus.textContent = "โหลดไม่ได้: " + e.message;
      elRows.innerHTML = `<tr><td colspan="8" class="muted">เชื่อมต่อ API ไม่สำเร็จ</td></tr>`;
    }
  }

  loadLatest();
  setInterval(loadLatest, 5000);
</script>

</body>
</html>

<script>
  function sevClass(s){
    if(!s) return "";
    const x = String(s).toUpperCase();
    if(x.includes("RED")) return "red";
    if(x.includes("YELLOW")) return "yellow";
    return "green";
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      alert("คัดลอกแล้ว: " + text);
    }catch(e){
      prompt("คัดลอกไม่สำเร็จ คัดลอกเอง:", text);
    }
  }

  function renderCards(items){
    const all = items.length;
    const online = items.filter(x => x.online).length;
    const offline = all - online;

    const red = items.filter(x => (x.severity||"").toUpperCase()==="RED").length;
    const yellow = items.filter(x => (x.severity||"").toUpperCase()==="YELLOW").length;
    const green = items.filter(x => (x.severity||"").toUpperCase()==="GREEN").length;

    // ใช้กล่องสไตล์เดียวกับ statusbar
    return `
      <div style="
        margin:0 0 14px;
        display:grid; gap:10px;
        grid-template-columns: repeat(6, minmax(140px, 1fr));
      ">
        ${card("ทั้งหมด", all)}
        ${card("ออนไลน์", online, "color:#86efac")}
        ${card("ออฟไลน์", offline, "color:rgba(233,238,252,.55)")}
        ${card("RED", red, "color:#fecaca")}
        ${card("YELLOW", yellow, "color:#fde68a")}
        ${card("GREEN", green, "color:#86efac")}
      </div>
    `;

    function card(label, value, extra=""){
      return `
        <div style="
          padding:12px 14px;
          background:rgba(255,255,255,.04);
          border:1px solid var(--line);
          border-radius: var(--radius);
          box-shadow: 0 10px 22px rgba(0,0,0,.25);
        ">
          <div class="muted" style="font-size:12px">${label}</div>
          <div style="font-size:22px;font-weight:900;margin-top:4px;${extra}">${value}</div>
        </div>
      `;
    }
  }

  async function loadLatest() {
    const elStatus = document.getElementById("status");
    const elRows = document.getElementById("rows");
    const elCards = document.getElementById("cards");

    try {
      const res = await fetch("/queues/monitor/api/summary/");
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");

      const nowStr = new Date().toLocaleTimeString();
      const items = data.items || [];

      // summary text
      const onlineCount = items.filter(r => r.online).length;
      elStatus.textContent = `อัปเดตล่าสุด: ${nowStr} | ออนไลน์: ${onlineCount}/${items.length}`;

      // cards
      if(elCards) elCards.innerHTML = renderCards(items);

      if (items.length === 0) {
        elRows.innerHTML = `<tr><td colspan="8" class="muted">ยังไม่มีข้อมูล</td></tr>`;
        return;
      }

      elRows.innerHTML = items.map(r => {
        const onlineText = r.online ? "ออนไลน์" : "ออฟไลน์";
        const onlineCls = r.online ? "online" : "offline";
        const dotCls = r.online ? "good" : "bad";

        const sev = r.severity ?? "-";
        const sevCss = sevClass(sev);

        const v = r.vitals || {};
        const bp = (v.sys_bp ?? "-") + "/" + (v.dia_bp ?? "-");

        const vitalsHtml = `
          <div class="vitals">
            <span class="kv"><span class="muted">BPM</span> <b>${v.bpm ?? "-"}</b></span>
            <span class="kv"><span class="muted">O2</span> <b>${v.o2sat ?? "-"}</b></span>
            <span class="kv"><span class="muted">BT</span> <b>${v.bt ?? "-"}</b></span>
            <span class="kv"><span class="muted">RR</span> <b>${v.rr ?? "-"}</b></span>
            <span class="kv"><span class="muted">BP</span> <b>${bp}</b></span>
          </div>
        `;

        return `
          <tr>
            <td data-label="ลำดับ">#${r.visit_id}</td>

            <td data-label="ผู้ป่วย">
              <div style="font-weight:800">${r.patient_name ?? "-"}</div>
              <div class="muted">รหัส Visit: ${r.visit_id}</div>
            </td>

            <td data-label="ระดับ">
              <span class="sev ${sevCss}">${sev}</span>
            </td>

            <td data-label="AI">
              <span class="aiTag">-</span>
            </td>

            <td data-label="อุปกรณ์">
              <span class="pill" style="color:var(--text)">${r.device_id ?? "-"}</span>
            </td>

            <td data-label="ออนไลน์">
              <span class="onlineTag ${onlineCls}">
                <span class="dot ${dotCls}"></span>${onlineText}
              </span>
            </td>

            <td data-label="สัญญาณชีพล่าสุด">
              ${vitalsHtml}
            </td>

            <td data-label="คำสั่ง">
              <a class="rightLink" href="/queues/monitor/visit/${r.visit_id}/">ดูรายละเอียด</a>
            </td>
          </tr>
        `;
      }).join("");

    } catch (e) {
      elStatus.textContent = "โหลดไม่ได้: " + e.message;
      elRows.innerHTML = `<tr><td colspan="8" class="muted">เชื่อมต่อ API ไม่สำเร็จ</td></tr>`;
    }
  }

  loadLatest();
  setInterval(loadLatest, 5000);
</script>

</body>
</html>
