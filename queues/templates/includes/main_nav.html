<style>
  .opd-main-tabs {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: max-content;
    max-width: 100%;
    margin: 0;
    padding: 5px;
    border: 1px solid #dbe7ea;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 4px 18px rgba(38, 75, 89, .07);
    overflow-x: auto;
  }

  .opd-main-tab {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 13px;
    border-radius: 7px;
    color: #526d79 !important;
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    text-decoration: none !important;
    white-space: nowrap;
    background: transparent;
    border: 0;
    box-shadow: none;
    transition: background .16s ease, color .16s ease;
  }

  .opd-main-tab:hover {
    color: #087f75 !important;
    background: #edf7f6;
  }

  .opd-main-tab.active {
    color: #ffffff !important;
    background: #087f75;
  }

  .topbar > .opd-main-tabs,
  .top > .opd-main-tabs,
  .page-head > .opd-main-tabs,
  .header > .opd-main-tabs,
  .hero > .opd-main-tabs {
    justify-self: center;
    align-self: start;
  }

  .top > .opd-main-tabs,
  .page-head > .opd-main-tabs,
  .header > .opd-main-tabs,
  .hero > .opd-main-tabs {
    position: fixed;
    top: 24px;
    left: 50%;
    z-index: 40;
    transform: translateX(-50%);
  }

  @media (max-width: 760px) {
    .opd-main-tabs {
      justify-content: flex-start;
      width: 100%;
    }

    .top > .opd-main-tabs,
    .page-head > .opd-main-tabs,
    .header > .opd-main-tabs,
    .hero > .opd-main-tabs {
      position: static;
      transform: none;
      margin-top: 12px;
    }
  }

  /* Keep the main workflow tabs in exactly the same viewport position on
     every page, regardless of which page header includes this partial. */
  .opd-main-tabs {
    position: fixed !important;
    top: 14px !important;
    left: 50% !important;
    z-index: 100 !important;
    width: max-content !important;
    max-width: calc(100vw - 32px) !important;
    margin: 0 !important;
    transform: translateX(-50%) !important;
  }

  @media (max-width: 760px) {
    .opd-main-tabs {
      top: 10px !important;
      width: calc(100vw - 24px) !important;
      justify-content: flex-start !important;
    }
  }
</style>
<nav class="opd-main-tabs" aria-label="หลัก">
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'waiting_vitals' %}active{% endif %}" href="{% url 'waiting_vitals' %}">รอวัดค่า</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'waiting_confirmation' %}active{% endif %}" href="{% url 'waiting_confirmation' %}">รอยืนยัน</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'queue_list' %}active{% endif %}" href="{% url 'queue_list' %}">คิว</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'patient_search' or request.resolver_match.url_name == 'patient_history' %}active{% endif %}" href="{% url 'patient_search' %}">ผู้ป่วย</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'opd_list' or request.resolver_match.url_name == 'opd_room_select' or request.resolver_match.url_name == 'visit_assessment' or request.resolver_match.url_name == 'opd_visit_detail' %}active{% endif %}" href="{% url 'opd_list' %}">ห้องตรวจ</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'monitor_dashboard' or request.resolver_match.url_name == 'followup_visit_detail' or request.resolver_match.url_name == 'waiting_monitor_dashboard' or request.resolver_match.url_name == 'waiting_monitor_visit_detail' %}active{% endif %}" href="/queues/monitor/">ติดตาม</a>
  <a class="opd-main-tab {% if request.path|slice:':8' == '/device/' %}active{% endif %}" href="/device/">อุปกรณ์</a>
  <a class="opd-main-tab {% if request.resolver_match.app_name == 'dashboard' or request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'dashboard_view' %}active{% endif %}" href="/dashboard/">แดชบอร์ด</a>
  <a class="opd-main-tab {% if request.resolver_match.url_name == 'waiting_time_report' %}active{% endif %}" href="{% url 'dashboard:waiting_time_report' %}">รายงาน</a>
</nav>
